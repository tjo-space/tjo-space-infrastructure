APP_NAME = code.tjo.space
RUN_MODE = prod
RUN_USER = git

[repository]
ROOT = /data/git/repositories

[repository.local]
LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

[repository.upload]
TEMP_PATH = /data/gitea/uploads

[cors]
ENABLED = true
ALLOWED_DOMAIN = code.tjo.space

[ui.meta]
AUTHOR = Git instance code.tjo.space
DESCRIPTION = Store your code at code.tjo.space

[server]
APP_DATA_PATH    = /data/gitea
DOMAIN           = code.tjo.space
SSH_DOMAIN       = code.tjo.space
HTTP_PORT        = 3000
ROOT_URL         = https://code.tjo.space/
DISABLE_SSH      = false
START_SSH_SERVER = true
SSH_PORT         = 22
SSH_LISTEN_PORT  = 2244
SSH_SERVER_USE_PROXY_PROTOCOL = true
LFS_START_SERVER = true
LFS_JWT_SECRET   = {{ forgejo.lfs_jwt_secret }}
OFFLINE_MODE     = false

[lfs]
PATH = /data/git/lfs

[database]
DB_TYPE  = postgres
HOST     = endor-one.postgresql.cloud.internal:5432
NAME     = code.tjo.space
USER     = {{ forgejo.database.username }}
PASSWD   = {{ forgejo.database.password }}
LOG_SQL  = false
SCHEMA   = public
SSL_MODE = require
CHARSET  = utf8

[cache]
ADAPTER = redis
HOST    = redis://[fd6a:e0a3:bb4b:c6b3::3]:6379/0

[indexer]
ISSUE_INDEXER_PATH = /data/gitea/indexers/issues.bleve

[session]
PROVIDER_CONFIG = /data/gitea/sessions
PROVIDER        = file

[picture]
AVATAR_UPLOAD_PATH            = /data/gitea/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /data/gitea/repo-avatars
DISABLE_GRAVATAR              = false
ENABLE_FEDERATED_AVATAR       = true

[attachment]
PATH = /data/gitea/attachments

[log]
ROOT_PATH            = /data/gitea/log
MODE                 = console
LEVEL                = info

[security]
INSTALL_LOCK   = true
SECRET_KEY     = {{ forgejo.secret_key }}
INTERNAL_TOKEN = {{ forgejo.internal_token }}
REVERSE_PROXY_TRUSTED_PROXIES = fd6a:e0a3:bb4b:c6b3::1

[service]
DISABLE_REGISTRATION                   = false
ALLOW_ONLY_EXTERNAL_REGISTRATION       = true
REQUIRE_SIGNIN_VIEW                    = false
ENABLE_NOTIFY_MAIL                     = true
ENABLE_CAPTCHA                         = false
DEFAULT_KEEP_EMAIL_PRIVATE             = true
DEFAULT_ALLOW_CREATE_ORGANIZATION      = true
DEFAULT_ENABLE_TIMETRACKING            = true
NO_REPLY_ADDRESS                       = noreply.code.tjo.space

[oauth2]
JWT_SECRET = {{ forgejo.jwt_secret }}
ENABLE_AUTO_REGISTRATION = true
USERNAME = nickname
ACCOUNT_LINKING = auto

[mailer]
ENABLED        = true
PROTOCOL       = smtps
SMTP_ADDR      = mail.tjo.cloud
SMTP_PORT      = 465
FROM           = no-reply@tjo.space
USER           = {{ forgejo.mailer.username }}
PASSWD         = {{ forgejo.mailer.password }}

[federation]
ENABLED = true

[packages]
ENABLED = true

[actions]
ENABLED=true
DEFAULT_ACTIONS_URL=github
